<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GThanks - GitHub Contributors Image and API URL Generator</title>
  <meta name="description" content="GThanks generates shareable GitHub contributor JSON and transparent avatar-grid PNG URLs for users, organizations, and repositories.">
  <meta name="author" content="Yorukot">
  <meta name="robots" content="index, follow">
  <meta name="application-name" content="GThanks">
  <meta name="theme-color" content="#f6ead6">
  <meta name="color-scheme" content="light">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="canonical" href="https://gthanks.yorukot.me/">
  <link rel="me" href="https://yorukot.me">
  <link rel="author" href="https://yorukot.me">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="GThanks">
  <meta property="og:title" content="GThanks - GitHub Contributors Image and API URL Generator">
  <meta property="og:description" content="Generate shareable GitHub contributor JSON and transparent avatar-grid PNG URLs for users, organizations, and repositories.">
  <meta property="og:url" content="https://gthanks.yorukot.me/">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="GThanks - GitHub Contributors Image and API URL Generator">
  <meta name="twitter:description" content="Generate shareable GitHub contributor JSON and transparent avatar-grid PNG URLs for users, organizations, and repositories.">
  <style>
    :root {
      color-scheme: light;
      --paper: #f6ead6;
      --paper-deep: #ecd8b8;
      --sheet: #fffaf0;
      --sheet-warm: #fff3d8;
      --ink: #15110d;
      --muted: #776c5d;
      --subtle: #4f473c;
      --line: #15110d;
      --green: #6fbf3a;
      --green-dark: #185f23;
      --green-soft: #dff1bd;
      --love: #ff4d61;
      --gold: #ffc83d;
      --sky: #8bd1de;
      --shadow: rgba(21, 17, 13, 0.2);
      font-family:
        "Trebuchet MS", "Segoe Print", "Comic Sans MS", ui-rounded,
        system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 200, 61, 0.28) 0 2px, transparent 3px),
        radial-gradient(circle at 86% 16%, rgba(111, 191, 58, 0.22) 0 2px, transparent 3px),
        linear-gradient(90deg, rgba(21, 17, 13, 0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(21, 17, 13, 0.03) 1px, transparent 1px),
        var(--paper);
      background-size: 88px 88px, 104px 104px, 42px 42px, 42px 42px, auto;
    }

    body::before,
    body::after {
      position: fixed;
      z-index: -1;
      color: rgba(21, 17, 13, 0.08);
      font-size: 14rem;
      font-weight: 900;
      line-height: 1;
      pointer-events: none;
    }

    body::before {
      content: "{";
      left: max(12px, calc((100vw - 1180px) / 2 - 84px));
      top: 178px;
    }

    body::after {
      content: "}";
      right: max(12px, calc((100vw - 1180px) / 2 - 84px));
      top: 188px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 3px solid var(--line);
      border-radius: 14px 11px 16px 10px;
      color: var(--ink);
      background: var(--sheet);
      box-shadow: 4px 5px 0 var(--line);
      cursor: pointer;
      transition:
        background 140ms ease,
        box-shadow 140ms ease,
        color 140ms ease;
    }

    button:hover:not(:disabled) {
      color: var(--ink);
      background: var(--green-soft);
      box-shadow: 2px 3px 0 var(--line);
    }

    button:focus-visible {
      outline: 4px solid var(--gold);
      outline-offset: 4px;
    }

    button:disabled {
      color: var(--muted);
      cursor: not-allowed;
      opacity: 0.65;
      box-shadow: 2px 2px 0 rgba(21, 17, 13, 0.38);
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 46px;
      border: 3px solid var(--line);
      border-radius: 13px 10px 15px 11px;
      color: var(--ink);
      background: rgba(255, 250, 240, 0.92);
      outline: none;
      box-shadow: inset 2px 2px 0 rgba(21, 17, 13, 0.05);
    }

    input,
    select {
      padding: 0 12px;
    }

    textarea {
      min-height: 108px;
      padding: 12px;
      resize: vertical;
      font-family:
        "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      line-height: 1.5;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--green-dark);
      box-shadow:
        0 0 0 4px rgba(255, 200, 61, 0.34),
        inset 2px 2px 0 rgba(21, 17, 13, 0.05);
    }

    label,
    legend {
      display: block;
      margin: 0 0 8px;
      color: var(--subtle);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .field-help {
      margin: -2px 0 8px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.4;
    }

    fieldset {
      margin: 0;
      padding: 0;
      border: 0;
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 26px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: grid;
      width: 56px;
      height: 56px;
      place-items: center;
      overflow: hidden;
      border: 3px solid var(--line);
      border-radius: 17px 14px 19px 13px;
      background: var(--sheet);
      box-shadow: 4px 5px 0 var(--line);
    }

    .mark img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      font-size: 2.45rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .top-links {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px 12px;
      color: var(--subtle);
      font-size: 0.95rem;
      font-weight: 700;
      text-align: right;
    }

    .top-links a {
      color: var(--green-dark);
      font-weight: 700;
      text-decoration: none;
    }

    .top-links a:hover,
    .top-links a:focus {
      color: var(--love);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .top-links a:focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 3px;
      border-radius: 4px;
    }

    .support-title {
      display: flex;
      justify-content: center;
      margin: 0 0 24px;
      text-align: center;
    }

    .support-title a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border: 3px solid var(--line);
      border-radius: 999px 920px 980px 870px;
      color: var(--ink);
      background: var(--gold);
      box-shadow: 3px 4px 0 var(--line);
      font-size: 1rem;
      font-weight: 800;
      text-decoration: none;
    }

    .support-title a:hover,
    .support-title a:focus {
      color: var(--ink);
      background: var(--sheet);
      text-decoration: none;
    }

    .support-title a:focus-visible {
      outline: 3px solid var(--green-dark);
      outline-offset: 4px;
      border-radius: 4px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(340px, 0.98fr);
      gap: 22px;
      align-items: start;
    }

    .panel {
      position: relative;
      border: 4px solid var(--line);
      border-radius: 24px 18px 28px 20px;
      background: rgba(255, 250, 240, 0.96);
      box-shadow: 7px 8px 0 var(--line);
    }

    .panel:nth-child(2) {
      background: rgba(255, 243, 216, 0.96);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 4px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .status {
      max-width: 44ch;
      color: var(--green-dark);
      font-size: 0.88rem;
      font-weight: 800;
      text-align: right;
    }

    .status.invalid {
      color: #9a4d00;
    }

    .panel-body {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .field {
      min-width: 0;
    }

    .field.wide {
      grid-column: 1 / -1;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 7px;
      border: 3px solid var(--line);
      border-radius: 17px 13px 18px 12px;
      background: var(--paper-deep);
    }

    .segment {
      position: relative;
      margin: 0;
    }

    .segment input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .segment span {
      display: flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      border: 2px solid transparent;
      border-radius: 12px 9px 13px 8px;
      color: var(--subtle);
      font-weight: 800;
      text-align: center;
      cursor: pointer;
    }

    .segment input:checked + span {
      border-color: var(--line);
      color: var(--ink);
      background: var(--green);
      box-shadow: 3px 3px 0 var(--line);
      font-weight: 700;
    }

    .checks {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(136px, 1fr));
      gap: 10px;
      grid-column: 1 / -1;
    }

    .check {
      display: flex;
      min-width: 0;
      min-height: 44px;
      align-items: center;
      gap: 10px;
      margin: 0;
      padding: 10px 12px;
      border: 3px solid var(--line);
      border-radius: 16px 11px 15px 12px;
      color: var(--ink);
      background: var(--sheet);
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(21, 17, 13, 0.14);
    }

    .check input {
      flex: 0 0 18px;
      width: 18px;
      min-height: 18px;
      accent-color: var(--green);
    }

    .check span {
      min-width: 0;
      overflow-wrap: anywhere;
      line-height: 1.2;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      grid-column: 1 / -1;
      padding-top: 2px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .actions button {
      min-height: 46px;
      padding: 0 16px;
      font-weight: 900;
    }

    .primary {
      color: var(--ink);
      background: var(--green);
    }

    .primary:hover:not(:disabled) {
      color: var(--ink);
      background: var(--love);
    }

    .result-stack {
      display: grid;
      gap: 16px;
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .result-head h3 {
      margin: 0;
      color: var(--green-dark);
      font-size: 0.9rem;
      font-weight: 900;
    }

    .copy {
      min-height: 34px;
      padding: 0 10px;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .url-output {
      min-height: 84px;
    }

    .preview {
      display: none;
      border-top: 4px dashed rgba(21, 17, 13, 0.65);
      padding-top: 16px;
    }

    .preview.is-visible {
      display: block;
    }

    .preview-frame {
      display: grid;
      margin-top: 14px;
      min-height: 180px;
      place-items: center;
      overflow: auto;
      border: 3px solid var(--line);
      border-radius: 0;
      background:
        linear-gradient(45deg, rgba(21, 17, 13, 0.08) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(21, 17, 13, 0.08) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(21, 17, 13, 0.08) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(21, 17, 13, 0.08) 75%),
        var(--sheet);
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      background-size: 20px 20px;
      box-shadow: inset 0 0 0 6px rgba(255, 255, 255, 0.42);
    }

    .preview-frame img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .preview-empty {
      padding: 24px;
      color: var(--muted);
      font-weight: 800;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 880px) {
      body::before,
      body::after {
        display: none;
      }

      .layout,
      .grid,
      .options {
        grid-template-columns: 1fr;
      }

      .checks {
        grid-template-columns: 1fr;
      }

      .top-links {
        justify-content: flex-start;
        text-align: left;
      }
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 20px, 1120px);
        padding-top: 18px;
      }

      .topbar,
      .panel-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .panel {
        border-width: 3px;
        box-shadow: 5px 6px 0 var(--line);
      }

      .status {
        text-align: left;
      }

      .segmented {
        grid-template-columns: 1fr;
      }

      .actions button {
        flex: 1 1 140px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <img src="/assets/logo.svg" alt="">
        </div>
        <h1>GThanks</h1>
      </div>
      <div class="top-links">
        <span>Made by <a href="https://yorukot.me">Yorukot</a> with Love</span>
        <a href="https://github.com/yorukot/gthanks">View on GitHub</a>
      </div>
    </header>

    <div class="support-title">
      <a href="https://yorukot.me/thanks">
        <span aria-hidden="true">&#9749;</span>
        <span>Buy me a coffee</span>
      </a>
    </div>

    <div class="layout">
      <section class="panel" aria-labelledby="controls-title">
        <div class="panel-header">
          <h2 class="panel-title" id="controls-title">Request</h2>
          <div class="status" id="status" role="status" aria-live="polite">Ready</div>
        </div>
        <div class="panel-body">
          <div class="grid">
            <fieldset class="field wide">
              <legend>Output type</legend>
              <div class="segmented">
                <label class="segment">
                  <input type="radio" name="endpoint" value="image" checked>
                  <span>Image</span>
                </label>
                <label class="segment">
                  <input type="radio" name="endpoint" value="json">
                  <span>JSON</span>
                </label>
              </div>
            </fieldset>

            <div class="field wide" data-target-field>
              <label for="target">Target</label>
              <p class="field-help" id="target-help">Use a GitHub user or organization like yorukot, or a repository like yorukot/gthanks.</p>
              <input id="target" type="text" autocomplete="off" spellcheck="false" placeholder="yorukot or yorukot/gthanks" aria-describedby="target-help">
            </div>

            <div class="checks" data-shared-options>
              <label class="check">
                <input id="refresh" type="checkbox">
                <span>refresh</span>
              </label>
              <label class="check" data-summary-option>
                <input id="summary" type="checkbox" checked>
                <span>summary</span>
              </label>
              <label class="check">
                <input id="include-forks" type="checkbox">
                <span>include_forks</span>
              </label>
              <label class="check">
                <input id="include-bots" type="checkbox" checked>
                <span>include_bots</span>
              </label>
            </div>

            <div class="options hidden" data-image-options>
              <div class="field">
                <label for="per-row">per_row</label>
                <input id="per-row" type="number" min="1" max="20" step="1" value="12">
              </div>
              <div class="field">
                <label for="width">width</label>
                <input id="width" type="number" min="100" max="4000" step="1" value="1920">
              </div>
              <div class="field">
                <label for="shape">shape</label>
                <select id="shape">
                  <option value="circle" selected>circle</option>
                  <option value="square">square</option>
                </select>
              </div>
              <div class="field">
                <label for="limit">limit</label>
                <input id="limit" type="number" min="1" max="9223372036854775807" step="1" value="144">
              </div>
              <div class="field">
                <label for="padding">padding</label>
                <input id="padding" type="number" min="0" max="500" step="1" value="0">
              </div>
              <div class="field">
                <label for="space">space</label>
                <input id="space" type="number" min="0" max="500" step="1" value="12">
              </div>
            </div>
          </div>

          <div class="actions">
            <button class="primary" id="open-url" type="button">Open URL</button>
            <button id="preview-image" type="button">Reload Image</button>
            <button id="reset-form" type="button">Reset</button>
          </div>
        </div>
      </section>

      <section class="panel" aria-labelledby="output-title">
        <div class="panel-header">
          <h2 class="panel-title" id="output-title">Output</h2>
        </div>
        <div class="panel-body result-stack">
          <div>
            <div class="result-head">
              <h3>URL</h3>
              <button class="copy" type="button" data-copy="url-output">Copy URL</button>
            </div>
            <textarea class="url-output" id="url-output" readonly spellcheck="false"></textarea>
          </div>

          <div class="preview" id="preview">
            <div class="result-head">
              <h3>Preview</h3>
              <button class="copy" type="button" data-copy="image-markdown">Copy Markdown</button>
            </div>
            <input id="image-markdown" type="text" readonly spellcheck="false">
            <div class="preview-frame" id="preview-frame">
              <div class="preview-empty">No image loaded</div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const defaults = {
      output: "image",
      target: "yorukot",
      refresh: false,
      summary: true,
      includeForks: false,
      includeBots: true,
      perRow: "12",
      width: "1920",
      shape: "circle",
      limit: "144",
      padding: "0",
      space: "12"
    };

    const state = {
      lastPreviewURL: "",
      previewTimer: 0
    };

    const el = {
      target: document.querySelector("#target"),
      refresh: document.querySelector("#refresh"),
      summary: document.querySelector("#summary"),
      includeForks: document.querySelector("#include-forks"),
      includeBots: document.querySelector("#include-bots"),
      perRow: document.querySelector("#per-row"),
      width: document.querySelector("#width"),
      shape: document.querySelector("#shape"),
      limit: document.querySelector("#limit"),
      padding: document.querySelector("#padding"),
      space: document.querySelector("#space"),
      targetField: document.querySelector("[data-target-field]"),
      sharedOptions: document.querySelector("[data-shared-options]"),
      summaryOption: document.querySelector("[data-summary-option]"),
      imageOptions: document.querySelector("[data-image-options]"),
      status: document.querySelector("#status"),
      openURL: document.querySelector("#open-url"),
      previewImage: document.querySelector("#preview-image"),
      resetForm: document.querySelector("#reset-form"),
      urlOutput: document.querySelector("#url-output"),
      preview: document.querySelector("#preview"),
      previewFrame: document.querySelector("#preview-frame"),
      imageMarkdown: document.querySelector("#image-markdown")
    };

    const endpointInputs = Array.from(document.querySelectorAll("input[name='endpoint']"));
    const formInputs = Array.from(document.querySelectorAll("input, select"));

    function initialBaseURL() {
      if (window.location.protocol === "http:" || window.location.protocol === "https:") {
        return window.location.origin;
      }
      return "http://localhost:8080";
    }

    function endpoint() {
      return endpointInputs.find((input) => input.checked).value;
    }

    function setEndpoint(value) {
      const endpointValue = value === "contributions" || value === "json" ? "json" : "image";
      endpointInputs.find((input) => input.value === endpointValue).checked = true;
    }

    function boolText(input) {
      return input.checked ? "true" : "false";
    }

    function boolParam(params, key, fallback) {
      const value = params.get(key);
      if (value === null) {
        return fallback;
      }
      return value === "true" || value === "1";
    }

    const maxIntText = "9223372036854775807";
    const maxInt = BigInt(maxIntText);

    function numberValue(input) {
      return Number.parseInt(input.value, 10);
    }

    function integerTextValue(input) {
      return input.value.trim();
    }

    function validateTarget(value) {
      const trimmed = value.trim();
      if (!trimmed) {
        return "target is required";
      }
      if (/\s/.test(trimmed)) {
        return "target cannot contain spaces";
      }
      const parts = trimmed.split("/");
      if (parts.length > 2 || parts.some((part) => part === "")) {
        return "target must be owner or owner/repo";
      }
      return "";
    }

    function validateRange(label, value, min, max) {
      if (!Number.isInteger(value)) {
        return label + " must be an integer";
      }
      if (value < min || value > max) {
        return label + " must be between " + min + " and " + max;
      }
      return "";
    }

    function validateIntegerTextRange(label, value, min, max, maxLabel) {
      if (!/^\d+$/.test(value)) {
        return label + " must be an integer";
      }
      const parsed = BigInt(value);
      if (parsed < BigInt(min) || parsed > max) {
        return label + " must be between " + min + " and " + maxLabel;
      }
      return "";
    }

    function validateImageOptions() {
      const perRow = numberValue(el.perRow);
      const width = numberValue(el.width);
      const limit = integerTextValue(el.limit);
      const padding = numberValue(el.padding);
      const space = numberValue(el.space);
      const checks = [
        validateRange("per_row", perRow, 1, 20),
        validateRange("width", width, 100, 4000),
        validateIntegerTextRange("limit", limit, 1, maxInt, "max_int"),
        validateRange("padding", padding, 0, 500),
        validateRange("space", space, 0, 500)
      ].filter(Boolean);

      if (checks.length > 0) {
        return checks[0];
      }
      if (width <= padding * 2 + (perRow - 1) * space) {
        return "width is too small for padding, space, and per_row";
      }
      if (width < padding * 2 + perRow) {
        return "width is too small for padding";
      }
      return "";
    }

    function validationMessage() {
      const selected = endpoint();
      const targetError = validateTarget(el.target.value);
      if (targetError) {
        return targetError;
      }
      if (selected === "image") {
        return validateImageOptions();
      }
      return "";
    }

    function buildURL() {
      const selected = endpoint();
      const base = initialBaseURL().replace(/\/+$/, "");
      const path = {
        json: "/json",
        image: "/image"
      }[selected];

      const params = new URLSearchParams();
      params.set("target", el.target.value.trim());
      params.set("refresh", boolText(el.refresh));
      params.set("include_forks", boolText(el.includeForks));
      params.set("include_bots", boolText(el.includeBots));

      if (selected === "json") {
        params.set("summary", boolText(el.summary));
      }

      if (selected === "image") {
        params.set("per_row", el.perRow.value);
        params.set("width", el.width.value);
        params.set("shape", el.shape.value);
        params.set("limit", el.limit.value);
        params.set("padding", el.padding.value);
        params.set("space", el.space.value);
      }

      return base + path + "?" + params.toString();
    }

    function buildPageParams() {
      const selected = endpoint();
      const params = new URLSearchParams();
      params.set("output", selected);
      params.set("target", el.target.value.trim());
      params.set("refresh", boolText(el.refresh));
      params.set("include_forks", boolText(el.includeForks));
      params.set("include_bots", boolText(el.includeBots));

      if (selected === "json") {
        params.set("summary", boolText(el.summary));
      }

      if (selected === "image") {
        params.set("per_row", el.perRow.value);
        params.set("width", el.width.value);
        params.set("shape", el.shape.value);
        params.set("limit", el.limit.value);
        params.set("padding", el.padding.value);
        params.set("space", el.space.value);
      }

      return params;
    }

    function syncPageURL() {
      if (!window.history || !window.history.replaceState) {
        return;
      }
      const query = buildPageParams().toString();
      const nextURL = window.location.pathname + "?" + query + window.location.hash;
      const currentURL = window.location.pathname + window.location.search + window.location.hash;
      if (nextURL !== currentURL) {
        window.history.replaceState(null, "", nextURL);
      }
    }

    function markdownFor(url) {
      return "![gthanks contributors](" + url + ")";
    }

    function setPreviewEmpty(message) {
      el.previewFrame.innerHTML = "";
      const empty = document.createElement("div");
      empty.className = "preview-empty";
      empty.textContent = message;
      el.previewFrame.append(empty);
    }

    function clearPreviewTimer() {
      if (state.previewTimer) {
        window.clearTimeout(state.previewTimer);
        state.previewTimer = 0;
      }
    }

    function schedulePreviewLoad(url, delay) {
      if (state.lastPreviewURL === url) {
        return;
      }
      clearPreviewTimer();
      setPreviewEmpty("Loading image...");
      state.previewTimer = window.setTimeout(() => {
        loadPreview(url);
      }, delay);
    }

    function updatePreviewVisibility() {
      const isImage = endpoint() === "image";
      el.preview.classList.toggle("is-visible", isImage);
      el.previewImage.classList.toggle("hidden", !isImage);
      if (!isImage) {
        clearPreviewTimer();
        state.lastPreviewURL = "";
        setPreviewEmpty("No image loaded");
      }
    }

    function render(options = {}) {
      const autoPreview = options.autoPreview !== false;
      const previewDelay = options.previewDelay ?? 500;
      const selected = endpoint();
      const error = validationMessage();
      const url = buildURL();

      el.summaryOption.classList.toggle("hidden", selected !== "json");
      el.imageOptions.classList.toggle("hidden", selected !== "image");
      updatePreviewVisibility();

      el.status.textContent = error || "Ready";
      el.status.classList.toggle("invalid", Boolean(error));
      el.openURL.disabled = Boolean(error);
      el.previewImage.disabled = Boolean(error) || selected !== "image";
      el.urlOutput.value = url;
      el.imageMarkdown.value = markdownFor(url);
      syncPageURL();

      if (selected !== "image") {
        clearPreviewTimer();
        return;
      }
      if (error) {
        clearPreviewTimer();
        state.lastPreviewURL = "";
        setPreviewEmpty("No image loaded");
        return;
      }
      if (autoPreview) {
        schedulePreviewLoad(url, previewDelay);
      }
    }

    async function copyValue(id, button) {
      const target = document.getElementById(id);
      const value = target.value;
      try {
        await navigator.clipboard.writeText(value);
      } catch (_err) {
        target.focus();
        target.select();
        document.execCommand("copy");
      }
      const original = button.textContent;
      button.textContent = "Copied";
      window.setTimeout(() => {
        button.textContent = original;
      }, 1200);
    }

    function loadPreview(url = buildURL()) {
      const error = validationMessage();
      if (error || endpoint() !== "image") {
        render({ autoPreview: false });
        return;
      }
      clearPreviewTimer();
      state.lastPreviewURL = url;
      el.previewFrame.innerHTML = "";
      const img = document.createElement("img");
      img.alt = "Contributor avatar grid";
      img.src = url;
      img.addEventListener("error", () => {
        setPreviewEmpty("Image request failed");
      });
      el.previewFrame.append(img);
    }

    function resetForm() {
      setEndpoint(defaults.output);
      el.target.value = defaults.target;
      el.refresh.checked = defaults.refresh;
      el.summary.checked = defaults.summary;
      el.includeForks.checked = defaults.includeForks;
      el.includeBots.checked = defaults.includeBots;
      el.perRow.value = defaults.perRow;
      el.width.value = defaults.width;
      el.shape.value = defaults.shape;
      el.limit.value = defaults.limit;
      el.padding.value = defaults.padding;
      el.space.value = defaults.space;
      state.lastPreviewURL = "";
      setPreviewEmpty("No image loaded");
      render({ previewDelay: 0 });
    }

    function loadFormFromPageURL() {
      const params = new URLSearchParams(window.location.search);
      resetForm();

      setEndpoint(params.get("output") || params.get("endpoint") || defaults.output);
      if (params.has("target")) {
        el.target.value = params.get("target");
      }
      el.refresh.checked = boolParam(params, "refresh", defaults.refresh);
      el.summary.checked = boolParam(params, "summary", defaults.summary);
      el.includeForks.checked = boolParam(params, "include_forks", defaults.includeForks);
      el.includeBots.checked = boolParam(params, "include_bots", defaults.includeBots);

      if (params.has("per_row")) {
        el.perRow.value = params.get("per_row");
      }
      if (params.has("width")) {
        el.width.value = params.get("width");
      }
      if (params.has("shape")) {
        el.shape.value = params.get("shape");
      }
      if (params.has("limit")) {
        el.limit.value = params.get("limit");
      }
      if (params.has("padding")) {
        el.padding.value = params.get("padding");
      }
      if (params.has("space")) {
        el.space.value = params.get("space");
      }

      state.lastPreviewURL = "";
      setPreviewEmpty("No image loaded");
      render({ previewDelay: 0 });
    }

    formInputs.forEach((input) => {
      input.addEventListener("input", render);
      input.addEventListener("change", render);
    });

    document.querySelectorAll("[data-copy]").forEach((button) => {
      button.addEventListener("click", () => copyValue(button.dataset.copy, button));
    });

    el.openURL.addEventListener("click", () => {
      if (!validationMessage()) {
        window.open(buildURL(), "_blank", "noopener,noreferrer");
      }
    });

    el.previewImage.addEventListener("click", () => loadPreview());
    el.resetForm.addEventListener("click", resetForm);

    loadFormFromPageURL();
  </script>
</body>
</html>
